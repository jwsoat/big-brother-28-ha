add_housemate:
  name: Add housemate
  description: >-
    Add one housemate or a list of housemates. In YAML, `name` accepts either
    a single string or a list (e.g. [Alex, Jordan]).
  fields:
    name:
      required: true
      example: "Alex"
      selector:
        text:

remove_housemate:
  name: Remove housemate
  description: >-
    Remove one housemate or a list of housemates. In YAML, `name` accepts
    either a single string or a list.
  fields:
    name:
      required: true
      example: "Alex"
      selector:
        text:

set_housemate_status:
  name: Set housemate status
  description: >-
    Update one housemate's current status, or apply the same status to a list
    of housemates. `name` accepts either a single string or a YAML list. Also
    auto-advances the Next Event sensor per the weekly cycle
    (HOH -> Nominations -> Veto Picks -> Veto -> Live Show -> back to HOH).
  fields:
    name:
      required: true
      example: "Alex"
      selector:
        text:
    status:
      required: true
      selector:
        select:
          options:
            - "HOH"
            - "Nominated"
            - "Veto Competitor"
            - "Veto Winner"
            - "Safe"
            - "Eliminated"
            - "Jury"

set_next_event:
  name: Set next event
  description: Manually override the next upcoming event.
  fields:
    event_type:
      required: true
      selector:
        select:
          options:
            - "HOH"
            - "Nominations"
            - "Veto Picks"
            - "Veto"
            - "Live Show"
            - "Eviction"
            - "Other"
    detail:
      required: false
      example: "Veto Ceremony"
      selector:
        text:
    scheduled_time:
      required: false
      example: "2026-07-10T20:00:00"
      selector:
        datetime:

set_have_not:
  name: Set have-not status
  description: >-
    Toggle have-not status for one housemate or a list of housemates. In YAML,
    `name` accepts either a single string or a list (e.g. [Alex, Jordan]).
  fields:
    name:
      required: true
      example: "Alex"
      selector:
        text:
    is_have_not:
      required: true
      selector:
        boolean:
